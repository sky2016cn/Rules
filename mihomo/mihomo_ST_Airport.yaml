# 此模板适用于 Chromecast，此版本不适合跑裸核
# 此模板增加了工行、阿里巴巴、京东、美团等规则
# 机场订阅，Airport1、Airport2，可以添加多个机场
# 删除了“全局配置、嗅探、入站、DNS模块”4大模块，在 OpenClash 上设置替换，只适用于 Fake-IP 模式 

proxy-providers:
  Airport:
    url: "机场订阅链接，不要删除双引号"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 🎯 全球直连
# 支持Airport1、Airport2 多个机场，如果不用机场，以上内容可全部删除

# 下方添加自建节点
proxies:
  #- {name: 自建节点1 ......}
  #- {name: 自建节点2 ......}
 
# 管理界面排序
