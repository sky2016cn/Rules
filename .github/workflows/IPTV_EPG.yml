name: Update IPTV_EPG

on:
  schedule:
    # 每天北京时间 07:17（UTC 23:17）更新，作者在北京时间 7点10分 自动更新
    - cron: '17 23 * * *'
  workflow_dispatch:

jobs:
  update-epg:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create IPTV_EPG directory
        run: mkdir -p IPTV_EPG

      - name: Download EPG files
        shell: bash
        run: |
          set -e

          download_file() {
            local url="$1"
            local output="$2"

            echo "➡️ 尝试下载: $url"

            for attempt in 1 2; do
              echo "第 $attempt 次尝试..."
              if curl -A "Mozilla/5.0" -L "$url" \
                --connect-timeout 30 \
                --max-time 90 \
                -o "$output"; then

                if [ -s "$output" ]; then
                  echo "✅ 下载成功: $output ($(du -h "$output" | cut -f1))"
                  return 0
                else
                  echo "⚠️ 文件为空，视为失败"
                fi
              else
                echo "⚠️ 下载失败"
              fi

              [ "$attempt" -eq 1 ] && sleep 30
            done

            echo "❌ 下载彻底失败: $url"
            return 1
          }

          # ===== 在这里添加 / 修改 EPG 源 =====
          download_file "http://epg.51zmt.top:8000/e1.xml" "IPTV_EPG/e1.xml" || {
            echo "❌ 本次 EPG 下载彻底失败，不进行更新，本次 workflow 将标记为失败"
            exit 1
          }

          echo "🎉 所有下载任务完成"

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

          git add IPTV_EPG/

          if git diff --staged --quiet; then
            echo "📭 文件未发生变化，跳过提交"
          else
            git commit -m "Update EPG $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "🚀 更新已推送"
          fi
