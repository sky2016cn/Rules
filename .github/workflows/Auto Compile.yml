name: Auto Compile Rulesets
on:
  push:
    paths:
      - '*.list'
  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      
      - name: Install Tools
        run: |
          set -e
          SB_VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest \
            | jq -r '.tag_name | ltrimstr("v")')
          echo "sing-box version: $SB_VERSION"
          curl -Lo sb.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v${SB_VERSION}/sing-box-${SB_VERSION}-linux-amd64.tar.gz"
          tar -xzf sb.tar.gz
          mv "sing-box-${SB_VERSION}-linux-amd64/sing-box" ./sb_compiler
          chmod +x sb_compiler
          
      - name: Compile Rules
        run: |
          set -e
          shopt -s nullglob
          mkdir -p rules
          for f in *.list; do
            name=${f%.list}
            echo "处理: $f"
            python3 .github/workflows/build.py "$f" "$name"
            if [ -f "$name.json" ]; then
              ./sb_compiler rule-set compile "$name.json" -o "rules/$name.srs"
              rm -f "$name.json"
            fi
          done
          
      - name: Commit
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add rules/
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "auto rules [skip ci]"
            git push
          fi
