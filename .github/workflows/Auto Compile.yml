name: Auto Compile Rulesets
on:
  push:
    paths:
      - '*.list'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Tools
        - name: Compile Rules
          run: |
            set -e
            shopt -s nullglob
            mkdir -p rules

            # 只编译有变更的 .list 文件（推荐）
            if [ "${{ github.event_name }}" = "push" ]; then
              FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '\.list$' || true)
            else
              # workflow_dispatch 时编译全部
              FILES=$(ls *.list 2>/dev/null || true)
            fi

            if [ -z "$FILES" ]; then
              echo "No changed .list files."
              exit 0
            fi

            for f in $FILES; do
              name=${f%.list}
              echo "=== Processing: $f ==="

              python3 .github/workflows/build.py "$f" "$name" || {
                echo "❌ build.py failed for $f"
                exit 1
              }

            # 编译 .srs（域名+IP段）
              if [ -f "$name.json" ]; then
                ./sb_compiler rule-set compile "$name.json" -o "rules/$name.srs"
                rm -f "$name.json"
                echo "✓ rules/$name.srs"
              fi

            # 编译 .mrs（域名）
              if [ -f "${name}_domain.list" ] && [ -s "${name}_domain.list" ]; then
                ./m_compiler convert-ruleset domain text "${name}_domain.list" "rules/$name.mrs"
                echo "✓ rules/$name.mrs"
              fi

            # 编译 .mrs（IP 段）
              if [ -f "${name}_ip.list" ] && [ -s "${name}_ip.list" ]; then
                ./m_compiler convert-ruleset ipcidr text "${name}_ip.list" "rules/${name}_ip.mrs"
                echo "✓ rules/${name}_ip.mrs"
              fi

            # 清理临时文件
              rm -f "${name}_domain.list" "${name}_ip.list"
            done
          
      - name: Commit
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add rules/*.srs rules/*.mrs || true
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "auto rules [skip ci]"
            git push
          fi
