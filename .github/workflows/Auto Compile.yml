name: Auto Compile Rulesets
on:
  push:
    paths:
      - '*.list'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Tools
        run: |
          set -e

          # sing-box
          SB_VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest \
            | jq -r '.tag_name | ltrimstr("v")')
          echo "sing-box version: $SB_VERSION"
          curl -Lo sb.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v${SB_VERSION}/sing-box-${SB_VERSION}-linux-amd64.tar.gz"
          tar -xzf sb.tar.gz
          mv "sing-box-${SB_VERSION}-linux-amd64/sing-box" ./sb_compiler
          chmod +x sb_compiler

          # mihomo
          MIHOMO_VERSION=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest \
            | jq -r '.tag_name')
          echo "mihomo version: $MIHOMO_VERSION"
          curl -Lo mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-${MIHOMO_VERSION}.gz"
          gunzip -c mihomo.gz > m_compiler
          chmod +x m_compiler

      - name: Compile Rules
        run: |
          set -e
          shopt -s nullglob
          mkdir -p rules
          for f in *.list; do
            name=${f%.list}
            echo "处理: $f"
            
            # 编译 .srs（域名+IP段）
            python3 .github/workflows/build.py "$f" "$name"
            if [ -f "$name.json" ]; then
              ./sb_compiler rule-set compile "$name.json" -o "rules/$name.srs"
              rm -f "$name.json"
            fi
            
            # 编译 .mrs（域名）
            if [ -f "${name}_domain.list" ] && [ -s "${name}_domain.list" ]; then
              echo "=== domain list 前5行 ==="
              head -5 "${name}_domain.list"
              ./m_compiler convert-ruleset domain text "${name}_domain.list" "rules/$name.mrs"
              echo "  ✓ rules/$name.mrs"
            fi
            
            # 编译 .mrs（IP 段）
            if [ -f "${name}_ip.list" ] && [ -s "${name}_ip.list" ]; then
              echo "=== ip list 前5行 ==="
              head -5 "${name}_ip.list"
              ./m_compiler convert-ruleset ipcidr text "${name}_ip.list" "rules/${name}_ip.mrs"
              echo "  ✓ rules/${name}_ip.mrs"
            fi
            
            # 清理临时文件
            rm -f "${name}_domain.list" "${name}_ip.list"
          done
          
      - name: Commit
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add rules/*.srs rules/*.mrs || true
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "auto rules [skip ci]"
            git push
          fi
